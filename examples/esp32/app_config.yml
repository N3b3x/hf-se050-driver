---
# ESP32 HF-SE050 Driver — app matrix for build scripts / CI
version: "1.0"

metadata:
  project: "ESP32 HF-SE050 Driver Examples"
  default_app: "se050_minimal_example"
  target: "esp32s3"
  idf_versions: ["release/v5.5", "release/v5.4"]
  build_types: [["Debug", "Release"], ["Debug"]]

apps:
  se050_minimal_example:
    description: "Bring-up: reset, T=1 warm reset, GET ATR, SELECT default applet"
    source_file: "se050_minimal_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "CRTP I2C transport + T=1 path validation"
      - "ATR/profile and applet selection smoke checks"

  se050_smoke_example:
    description: "Smoke: init/reset/ATR/select/get-version/get-random/get-free-memory"
    source_file: "se050_smoke_example.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "Exercises typed management APDUs on real silicon"
      - "Parses ATR profile and applet capabilities"

  se050_object_lifecycle_example:
    description: "Object lifecycle: write/read/delete binary object"
    source_file: "se050_object_lifecycle_example.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "WriteBinary with create semantics"
      - "ReadObject round-trip data verification"
      - "DeleteSecureObject cleanup"

  se050_cloud_onboarding_example:
    description: "Cloud onboarding: EC P-256 keygen + ECDSA challenge sign/verify"
    source_file: "se050_cloud_onboarding_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "Generate persistent EC keypair in SE050"
      - "Sign registration challenge digest inside secure element"
      - "Verify signature on-chip for provisioning sanity check"

  se050_secure_board_comms_example:
    description: "App-layer comms: Sender signs payload hash, Receiver verifies it"
    source_file: "se050_secure_board_comms_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "Demonstrates Board A sending a secure packet to Board B"
      - "Uses mbedtls_sha256 mixed with SE050 EcdsaSign"
      - "Shows proper anti-replay and nonce generation"

  se050_cloud_registration_packet_example:
    description: "Cloud registration packet: key existence/create + pubkey + challenge signature"
    source_file: "se050_cloud_registration_packet_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "Idempotent object flow via CheckObjectExists"
      - "Read public key material for backend enrollment payload"
      - "Generate challenge and ECDSA signature for registration proof"

build_config:
  build_types:
    Debug:
      description: "Debug build"
      cmake_build_type: "Debug"
      optimization: "-O0"
      debug_level: "-g3"
      defines: ["DEBUG"]

    Release:
      description: "Release build"
      cmake_build_type: "Release"
      optimization: "-O2"
      debug_level: "-g0"
      defines: ["NDEBUG"]

  build_directory_pattern: "build-app-{app_type}-type-{build_type}-target-{target}-idf-{idf_version}"
  project_name_pattern: "esp32_se050_{app_type}_app"

ci_config:
  timeout_minutes: 30
  fail_fast: false
  exclude_combinations: []
  special_apps: []
