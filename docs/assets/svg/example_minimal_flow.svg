<text x="40" y="50" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc" font-weight="700">se050_minimal_example.cpp Internal Flow</text>
<text x="40" y="80" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">The absolute baseline bring-up flow. Exclusively tests the underlying electrical I2C hardware integration, executes the ISO7816-3 T=1 protocol warm-reset sequence, captures the Answer To Reset (ATR) bytes, and selects the default NXP IoT Applet to prove system viability.</text>
