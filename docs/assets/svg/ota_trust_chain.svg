<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="540" viewBox="0 0 1300 540">
<defs>
  <!-- Arrows -->
  <marker id="A1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
  <marker id="A2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
  <marker id="A3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fbbf24"/></marker>
  <marker id="A4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#c084fc"/></marker>
  <marker id="Agray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
  
  <!-- Glow Filters -->
  <filter id="G1"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/></filter>
  <filter id="G2"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.35"/></filter>
  <filter id="G3"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.3"/></filter>
  <filter id="G4"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.25"/></filter>

  <!-- Gradients -->
  <linearGradient id="Bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/></linearGradient>
</defs>
<rect width="1300" height="540" fill="url(#Bg)"/>
<text x="40" y="50" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc" font-weight="700">OTA Security Trust Chain</text>
<text x="40" y="80" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">The end-to-end cryptographic trust chain proving firmware authenticity from CI compilation to BootROM execution.</text>
<rect x="40" y="120" width="320" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/><text x="60" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">1) Developer / CI Server</text><text x="60" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Compiles Firmware Binary</text><text x="60" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Hashes binary image (SHA-256)</text><text x="60" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Signs hash with Vendor PKI Root</text><text x="60" y="246" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Uploads Manifest + Image File</text><rect x="480" y="120" width="320" height="160" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#G3)"/><text x="500" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">2) OTA Server (Local/Cloud)</text><text x="500" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Hosts Firmware Binaries</text><text x="500" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Serves Manifest files over HTTPS</text><text x="500" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Maintains rollback window policies</text><rect x="920" y="120" width="320" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#G1)"/><text x="940" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">3) ESP32 MCU (Target Board)</text><text x="940" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Downloads Manifest and Image</text><text x="940" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Bootloader parses firmware headers</text><text x="940" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Computes post-download SHA-256</text><rect x="920" y="340" width="320" height="140" rx="12" fill="#022c22" stroke="#10b981" stroke-width="2" filter="url(#G2)"/><text x="940" y="372" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">4) NXP SE050</text><text x="940" y="400" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Holds Public Key Trust Anchor</text><text x="940" y="422" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Bootloader executes ECDSA Verify</text><text x="940" y="444" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Hardware Anti-rollback Gate</text><path d="M 360 200 L 480 200" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/><rect x="360.0" y="184.0" width="120" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="420.0" y="200.0" font-family="Inter, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="500">Deploy Pipeline</text><path d="M 800 200 L 920 200" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/><rect x="784.0" y="184.0" width="152" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="860.0" y="200.0" font-family="Inter, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="500">Download (over TLS)</text><path d="M 1080 280 L 1080 340" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="1008.0" y="294.0" width="144" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="1080.0" y="310.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">Verify Sig vs Hash</text><path d="M 1020 340 L 1020 280" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="944.0" y="294.0" width="152" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="1020.0" y="310.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">Status: OK / Reject</text>
</svg>