<text x="40" y="80" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">Demonstrates the complete CRUD lifecycle for Secure Objects stored within the SE050 NVRAM filesystem. Includes properly injecting raw binary blobs, successfully routing read-back operations, and intentionally destroying memory slots to free resources securely.</text>
