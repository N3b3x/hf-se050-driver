<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
<defs>
  <!-- Arrows -->
  <marker id="A1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
  <marker id="A2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
  <marker id="A3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fbbf24"/></marker>
  <marker id="A4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#c084fc"/></marker>
  <marker id="Agray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
  
  <!-- Glow Filters -->
  <filter id="G1"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/></filter>
  <filter id="G2"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.35"/></filter>
  <filter id="G3"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.3"/></filter>
  <filter id="G4"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.25"/></filter>

  <!-- Gradients -->
  <linearGradient id="Bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/></linearGradient>
</defs>
<rect width="1200" height="400" fill="url(#Bg)"/>
<text x="40" y="50" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc" font-weight="700">App-Layer Encrypted Packet Model</text>
<text x="40" y="80" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">Required only when standard TLS/DTLS is totally unviable. AES-GCM confidentiality combined with SE050-signed headers.</text>
<rect x="40" y="120" width="280" height="220" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#G1)"/><text x="60" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">Transmitter (Board A)</text><text x="60" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">1) Gather Application Payload</text><text x="60" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">2) Counter++ (Anti-replay limit)</text><text x="60" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">3) Generate 12-byte Nonce</text><text x="60" y="246" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">4) AES-GCM Encrypt with Key</text><text x="60" y="268" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">5) Attach SE050 Packet Auth Sig</text><rect x="880" y="120" width="280" height="220" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#G1)"/><text x="900" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">Receiver (Board B)</text><text x="900" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">1) Extract Header & Key ID</text><text x="900" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">2) Verify Counter > Last Seen</text><text x="900" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">3) Check ECDSA Auth Signature</text><text x="900" y="246" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">4) AES-GCM Decrypt & Tag Check</text><text x="900" y="268" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">5) Use Plaintext if Tag Valid!</text><rect x="360" y="200" width="480" height="110" rx="12" fill="#0f172a" stroke="#64748b" stroke-width="2"/><text x="380" y="232" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">Secure Custom Protocol Packet Frame</text><text x="380" y="260" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">[ HDR | KEY_ID ]  [ Frame Counter (Replay Prev) ]</text><text x="380" y="282" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">[ Unique Nonce (12B) ]  [ AES-GCM Ciphertext (N MB) ]</text><text x="380" y="304" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">[ AES-GCM AuthTag (16B) ]  [ SE050 ECDSA Signature (72B) ]</text><path d="M 320 240 L 360 240" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/><path d="M 840 240 L 880 240" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/>
</svg>