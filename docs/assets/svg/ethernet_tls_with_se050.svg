<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560">
<defs>
  <!-- Arrows -->
  <marker id="A1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
  <marker id="A2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
  <marker id="A3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fbbf24"/></marker>
  <marker id="A4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#c084fc"/></marker>
  <marker id="Agray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
  
  <!-- Glow Filters -->
  <filter id="G1"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/></filter>
  <filter id="G2"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.35"/></filter>
  <filter id="G3"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.3"/></filter>
  <filter id="G4"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.25"/></filter>

  <!-- Gradients -->
  <linearGradient id="Bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/></linearGradient>
</defs>
<rect width="1240" height="560" fill="url(#Bg)"/>
<text x="40" y="50" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc" font-weight="700">Ethernet TLS Flow with SE050 Identity</text>
<text x="40" y="80" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">The MCU delegates the critically sensitive TLS Handshake identity proof directly to the Secure Element.</text>
<rect x="40" y="120" width="400" height="380" rx="12" fill="#0f172a" stroke="#475569" stroke-width="2"/><text x="60" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">Board A (IoT Edge Device)</text><rect x="60" y="160" width="360" height="140" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#G1)"/><text x="80" y="192" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">ESP32 MCU</text><text x="80" y="220" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- mbedTLS Client (TCP/IP Stack)</text><text x="80" y="242" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Intercepts TLS identity operations</text><text x="80" y="264" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Hardware Accelerated AES Payload</text><rect x="60" y="330" width="360" height="140" rx="12" fill="#022c22" stroke="#10b981" stroke-width="2" filter="url(#G2)"/><text x="80" y="362" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">NXP SE050</text><text x="80" y="390" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Secure Element TEE</text><text x="80" y="412" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Protected ECDSA/RSA keys</text><text x="80" y="434" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Offloaded PKI Authentication</text><path d="M 240 300 L 240 330" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="200.0" y="299.0" width="80" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="240.0" y="315.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">I2C Bus</text><rect x="780" y="120" width="400" height="380" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#G3)"/><text x="800" y="152" font-family="Inter, sans-serif" font-size="18" fill="#f8fafc" font-weight="600">Board B (Cloud / Local Server)</text><text x="800" y="180" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Verifies Device Certificate Chain</text><text x="800" y="202" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Exposes Application Gateway/Broker</text><text x="800" y="224" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" xml:space="preserve">- Manages Ephemeral Session Keys</text><path d="M 420 200 L 780 200" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/><rect x="528.0" y="184.0" width="144" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="600.0" y="200.0" font-family="Inter, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="500">1) TLS ClientHello</text><path d="M 780 260 L 420 260" stroke="#60a5fa" stroke-width="3" marker-end="url(#A1)"/><rect x="484.0" y="244.0" width="232" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="600.0" y="260.0" font-family="Inter, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="500">2) ServerHello & Server Certs</text><path d="M 420 400 L 780 400" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="468.0" y="384.0" width="264" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="600.0" y="400.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">4) ClientVerify (Signed by SE050)</text><path d="M 420 460 L 780 460" stroke="#fbbf24" stroke-width="3" marker-end="url(#A3)" stroke-dasharray="6,6"/><rect x="468.0" y="444.0" width="264" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="600.0" y="460.0" font-family="Inter, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="500">5) AES-GCM Secure App Data Stream</text><path d="M 140 260 L 140 330" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="48.0" y="279.0" width="184" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="140.0" y="295.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">3a) Send Handshake Hash</text><path d="M 180 330 L 180 260" stroke="#34d399" stroke-width="3" marker-end="url(#A2)"/><rect x="76.0" y="279.0" width="208" height="24" rx="4" fill="#0f172a" opacity="0.8"/><text x="180.0" y="295.0" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" font-weight="500">3b) Receives ECDSA Der Sig</text>
</svg>